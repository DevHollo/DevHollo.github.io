<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Custom HTML 5 Elements</title>
        <link rel="icon" type="image/x-icon" href="/favicon.ico">
        <meta property="og:type" content="website">
        <meta property="og:title" content="Hollo's Website | Custom Elements">
        <meta property="og:description" content="Custom HTML 5 Elements!">
        <meta property="og:image" content="https://devhollo.github.io/!assets/img/meta.png">
        <meta property="og:url" content="https://devhollo.github.io/@/custom-elements/">
        <meta name="viewport" content="height=device-height, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui, viewport-fit=cover">
        <meta name="Author" content="@_.hollo._ on Discord">
        <meta http-equiv="content-type" content="text/html; charset=UTF8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta charset="utf-8">
        <style>
            @import url("https://fonts.googleapis.com/css?family=Linefont|Cherry+Swash");
            body {
                background-color: #ff95c0;
                font-family: Arial, Helvetica, sans-serif;
                color: #000;
            }
            h1 {
                font-size: 65px;
                font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            }
            button {
                box-shadow:inset 0px 1px 0px 0px #efdcfb;
                background:linear-gradient(to bottom, #dfbdfa 5%, #bc80ea 100%);
                background-color:#dfbdfa;
                border-radius:6px;
                border:1px solid #c584f3;
                display:inline-block;
                cursor:pointer;
                color:#ffffff;
                font-family:Arial;
                font-size:18px;
                font-weight:bold;
                padding:11px 24px;
                text-decoration:none;
                text-shadow:0px 1px 0px #9752cc;
            }
            button:hover {
                background:linear-gradient(to bottom, #bc80ea 5%, #dfbdfa 100%);
                background-color:#bc80ea;
            }
            button:active {
                position:relative;
                top:1px;
            }
            .newline {
                margin-bottom: 20px;
            }
            #spacer {
                font-family: 'Linefont';
            }
            .backbutton {
                box-shadow:inset 0px 1px 0px 0px #9c0c0c;
                background:linear-gradient(to bottom, #ff0000 5%, #730808 100%);
                background-color:#ff0000;
                border-radius:6px;
                border:1px solid #ff8f8f;
                display:inline-block;
                cursor:pointer;
                color:#ffffff;
                font-family:'Cherry Swash';
                font-size:11px;
                font-weight:bold;
                padding:3px 11px;
                text-decoration:none;
                text-shadow:0px 1px 0px #000000;
            }
            .backbutton:hover {
                background:linear-gradient(to bottom, #730808 5%, #ff0000 100%);
                background-color:#730808;
            }
            .backbutton:active {
                position:relative;
                top:1px;
            }
        </style>
    </head>
    <body>
        <a href="/@/">
            <button class="backbutton">Back</button>
        </a>
        <center>
            <h1>Custom Elements</h1>
            <div class="newline">
                <p id="spacer">
                    <b>lllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllllll</b>
                </p>
            </div>
            <div class="newline">
                <a href="./tests/mac-win">
                    <button>&lt;mac-win> Element</button>
                </a>
            </div>
        </center>
    </body>
</html>
