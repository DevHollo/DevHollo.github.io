<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Highlighting Example (html)</title>
        <link rel="stylesheet" type="text/css" href="https://devhollo.github.io/@/code-highlighting-in-html/css/codemirror.css">
        <script src="https://devhollo.github.io/@/code-highlighting-in-html/js/codemirror.js"></script>
        <script src="https://devhollo.github.io/@/code-highlighting-in-html/js/langs/html.js"></script>
        <script src="https://devhollo.github.io/@/code-highlighting-in-html/js/loaders/html.js" defer></script>
    </head>
    <body>
        <pre><html-code>
&lt;!-- this is a comment --&gt;

&lt;html lang="en">
    &lt;head>
        &lt;title>This is HTML&lt;/title>
        &lt;style>
            h1 {
                font-size: 65px;
                font-family: Impact;
            }
        &lt;/style>
    &lt;/head>
    &lt;body>
        &lt;h1>Hello World!&lt;/h1>
    &lt;/body>
&lt;/html>
        </html-code></pre>
    </body>
</html>
